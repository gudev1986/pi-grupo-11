{% extends 'base.html' %}

{% block title %}Excluir exemplar | BibliotecaPI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white"><strong>Confirmar exclusão</strong></div>
            <div class="card-body">
                <p>Deseja excluir o exemplar <strong>{{ object.codigo_tombo }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Excluir</button>
                    <a href="{% url 'acervo:exemplar_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
